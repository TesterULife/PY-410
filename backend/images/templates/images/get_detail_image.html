{% extends 'images/layout.html' %}

{% block title %}
Изображение: {{ getting_img.id }}
{% endblock %}


{% block content %}
<div class="features">

    <h1>Название: {{ getting_img.clean_name }}</h1>
    <h2>ID изображения: {{ getting_img.id }}</h2>
    <img src="{{ getting_img.image.url }}">
    <p>Дата создания: {{ getting_img.created_at }}</p>

    <a href="{% url 'get' %}" class="btn btn-warning">Вернуться в меню поиска</a>
</div>
{% endblock %}
